micronaut.application.name=simpler

simpler.backend.version=local

simpler.simplex.basic.max.iterations=20
simpler.simplex.basic.simplex.max.base.cycles=4

simpler.simplex.two-phase.max.iterations=20
simpler.simplex.two-phase.max.base.cycles=4

simpler.simplex.revised.max.iterations=20
simpler.simplex.revised.max.base.cycles=4

simpler.simplex.multiplicative.max.iterations=20
simpler.simplex.multiplicative.max.base.cycles=4

#Static resources configuration
micronaut.router.static-resources.default.enabled=true
micronaut.router.static-resources.default.paths=classpath:public
micronaut.router.static-resources.default.mapping=/**
