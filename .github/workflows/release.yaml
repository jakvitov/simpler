name: Build & Release

on:
  push:
    tags:
      - 'release/*'

jobs:

  # -----------------------------
  # Build JAR release
  # -----------------------------
  build-jar:
    name: Build JAR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#release/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # Keep versions consistent
      - name: Update build.gradle
        run: |
          sed -i "s/^version *= *.*/version = '${{ steps.version.outputs.version }}'/" backend/build.gradle

      - name: Update application.properties
        run: |
          sed -i "s/^simpler.backend.version=.*/simpler.backend.version=${{ steps.version.outputs.version }}/" backend/src/main/resources/application.properties

      # Build frontend (same as other job)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install FE deps
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: |
          npx tsc -b
          npx vite build

      - name: Copy frontend to backend
        run: |
          rm -rf backend/src/main/resources/public
          mkdir -p backend/src/main/resources/public
          cp -r frontend/dist/* backend/src/main/resources/public/

      # Build JAR
      - name: Build JAR
        working-directory: backend
        run: ./gradlew shadowJar

      # Rename
      - name: Rename JAR
        run: |
          mkdir dist
          cp backend/build/libs/*-all.jar dist/Simpler_${{ steps.version.outputs.version }}.jar
      # Upload artifact
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: Simpler_${{ steps.version.outputs.version }}_jar
          path: dist/*

  # -----------------------------
  # Create GitHub Release
  # -----------------------------
  release:
    needs: [build-jar]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: artifacts/*/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}